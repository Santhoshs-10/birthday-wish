<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday! 🎂❤️</title>
  <meta name="description" content="A magical birthday surprise website filled with love and joy." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script:wght@600;700&family=Nunito:wght@300;400;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ======= AUDIO ======= -->
  <audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mpeg" />
  </audio>
  <button id="music-toggle" title="Toggle Music">🎵</button>

  <!-- ======= SECTION 1: LANDING ======= -->
  <section id="landing">
    <canvas id="confetti-canvas"></canvas>
    <div class="landing-content">
      <div class="stars-bg"></div>
      <p class="subtitle animate-in">A Special Day Just For You ✨</p>
      <h1 class="main-title animate-in">Happy Birthday <span class="heart-pulse">❤️</span></h1>
      <div class="countdown-wrapper animate-in">
        <div class="countdown-label">Countdown to your magical moment</div>
        <div id="countdown" class="countdown-box">
          <div class="time-block"><span id="cd-days">00</span><label>Days</label></div>
          <div class="time-block"><span id="cd-hours">00</span><label>Hours</label></div>
          <div class="time-block"><span id="cd-mins">00</span><label>Mins</label></div>
          <div class="time-block"><span id="cd-secs">00</span><label>Secs</label></div>
        </div>
      </div>
      <a href="gift.html" id="open-surprise-btn" class="scroll-btn animate-in hidden">Open Your Surprise 🎁</a>
    </div>
    <div class="floating-emojis">
      <span>🎂</span><span>🎈</span><span>🌸</span><span>✨</span><span>🎊</span><span>💖</span><span>🎀</span><span>🌟</span>
    </div>
  </section>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="common.js"></script>
  <script src="index.js"></script>
</body>

</html>
